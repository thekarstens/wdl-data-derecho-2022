<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glowYellowBright" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur2"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur3"/>

      <feColorMatrix in="blur1" type="matrix"
        values="1 0 0 0 0
                0 0.95 0 0 0
                0 0 0.05 0 0
                0 0 0 1.0 0" result="yellow1"/>
      <feColorMatrix in="blur2" type="matrix"
        values="1 0 0 0 0
                0 0.93 0 0 0
                0 0 0.10 0 0
                0 0 0 0.80 0" result="yellow2"/>
      <feColorMatrix in="blur3" type="matrix"
        values="1 0 0 0 0
                0 0.90 0 0 0
                0 0 0.22 0 0
                0 0 0 0.50 0" result="yellow3"/>

      <feMerge>
        <feMergeNode in="yellow3"/>
        <feMergeNode in="yellow2"/>
        <feMergeNode in="yellow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glowYellowBright)">
    <path d="M323 36 L208 287 L288 257 L193 476 L309 226 L230 257 Z"
          fill="#ffffff"
          stroke="#ffea00"
          stroke-width="6"
          stroke-linejoin="round"/>
  </g>
</svg>
