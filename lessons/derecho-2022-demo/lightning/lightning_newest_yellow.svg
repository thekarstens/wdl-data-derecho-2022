<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="neonYellow" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="b1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="b2"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="34" result="b3"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="54" result="b4"/>

      <feFlood flood-color="#fff200" flood-opacity="1" result="c1"/>
      <feFlood flood-color="#ffe600" flood-opacity="0.95" result="c2"/>
      <feFlood flood-color="#ffd000" flood-opacity="0.72" result="c3"/>
      <feFlood flood-color="#fff6a8" flood-opacity="0.45" result="c4"/>

      <feComposite in="c1" in2="b1" operator="in" result="g1"/>
      <feComposite in="c2" in2="b2" operator="in" result="g2"/>
      <feComposite in="c3" in2="b3" operator="in" result="g3"/>
      <feComposite in="c4" in2="b4" operator="in" result="g4"/>

      <feMerge>
        <feMergeNode in="g4"/>
        <feMergeNode in="g3"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neonYellow)">
    <path d="M323 36 L208 287 L288 257 L193 476 L309 226 L230 257 Z"
          fill="#ffffff"
          stroke="#fff200"
          stroke-width="5"
          stroke-linejoin="round"/>
  </g>
</svg>
